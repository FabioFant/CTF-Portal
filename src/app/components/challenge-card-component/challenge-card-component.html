<mat-card [routerLink]="['/challenge', challenge().id]" appearance="outlined">
  <mat-card-header>
    <mat-card-title>{{ challenge().title }}</mat-card-title>
    <mat-card-subtitle>{{ challenge().points }}</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    @if (challenge().solved) {
      <p class="green">Solved</p>
    } @else {
      <p class="red">Not solved</p>
    }
    @if (challenge().dateAdded) {
      <p>{{ challenge().dateAdded | date: 'dd/MM/yyyy' }}</p>
    }
    @else {
      <p>No date given.</p>
    }
  </mat-card-content>
  <mat-card-footer>
    <mat-chip-set>
      <mat-chip>{{ challenge().category | uppercase}}</mat-chip>
    </mat-chip-set>
  </mat-card-footer>
  <mat-card-actions>
    <button matButton="filled" (click)="challengeSolved(); $event.stopImmediatePropagation()">Solve</button>
  </mat-card-actions>
</mat-card>
