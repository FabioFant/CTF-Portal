<form>
  <h2>Challenge form</h2>
  <mat-form-field floatLabel="Title">
        <mat-label>Title</mat-label>
        <input matInput placeholder="Challenge"/>
  </mat-form-field>
  <div class="form-group mt-2 mb-2">
    <label for="category">Category</label>
    <input name="category" type="text" class="form-control" id="category" placeholder="Enter Category"
      [(ngModel)]="newChallenge.category">
  </div>
  <div class="form-group mt-2 mb-2">
    <label for="points">Points</label>
    <input name="points" type="number" class="form-control" id="points" placeholder="Enter Points"
      [(ngModel)]="newChallenge.points">
  </div>
  <div class="form-check mt-2 mb-2">
    <input class="form-check-input" type="checkbox" name="includeDate" id="includeDate" [(ngModel)]="includeDate">
    <label class="form-check-label" for="includeDate">
      Include Date
    </label>
  </div>
  <button (click)="addChallenge()" type="button" class="btn btn-primary">Add Challenge</button>
  @if (errorOccured()) {
    <app-error-message class="mt-2" [message]="'Invalid challenge.'"></app-error-message>
  }
</form>
