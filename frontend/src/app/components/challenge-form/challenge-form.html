<h1>Add a challenge</h1>
<form>
  <div>
    <mat-form-field>
      <mat-label>Title</mat-label>
      <input matInput placeholder="Challenge" [(ngModel)]="newChallenge.title" name="title" id="title"
        [(ngModel)]="newChallenge.title" />
    </mat-form-field>
    <mat-form-field>
      <mat-label>Category</mat-label>
      <input matInput placeholder="WEB" name="category" id="category" [(ngModel)]="newChallenge.category" />
    </mat-form-field>
    <mat-form-field>
      <mat-label>Points</mat-label>
      <input matInput placeholder="100" type="number" id="points" name="points" [(ngModel)]="newChallenge.points">
    </mat-form-field>
  </div>
  <mat-checkbox name="includeDate" id="includeDate" [(ngModel)]="includeDate">Include Date</mat-checkbox>
  <button matButton="filled" (click)="addChallenge()" type="button">Add Challenge</button>
</form>
